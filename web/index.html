<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ThreatRadar — 脅威情報ダッシュボード</title>
  <meta name="description" content="CISA KEV / NVD / JPCERT / 主要セキュリティニュースを自動収集してスコアリング。">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%230a0d12'/%3E%3Ccircle cx='32' cy='32' r='22' fill='none' stroke='%236ee0c8' stroke-width='2.5'/%3E%3Ccircle cx='32' cy='32' r='12' fill='none' stroke='%236ee0c8' stroke-width='2'/%3E%3Cline x1='32' y1='6' x2='32' y2='58' stroke='%236ee0c8' stroke-width='2'/%3E%3Cline x1='6' y1='32' x2='58' y2='32' stroke='%236ee0c8' stroke-width='2'/%3E%3Ccircle cx='44' cy='22' r='3.5' fill='%23ff4f6e'/%3E%3C/svg%3E">
  <link rel="alternate icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%230a0d12'/%3E%3Ccircle cx='32' cy='32' r='22' fill='none' stroke='%236ee0c8' stroke-width='2.5'/%3E%3Ccircle cx='32' cy='32' r='12' fill='none' stroke='%236ee0c8' stroke-width='2'/%3E%3Ccircle cx='44' cy='22' r='3.5' fill='%23ff4f6e'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">⌖</span>
      <span class="brand-name">ThreatRadar</span>
      <span class="brand-update" id="last-updated">—</span>
    </div>
    <div class="quick-stats" id="quick-stats" aria-live="polite"></div>
    <div class="topbar-actions">
      <input type="search" id="search" placeholder="search…" aria-label="検索">
      <button id="toggle-lang" class="btn-ghost" title="JP / EN">JA</button>
      <button id="toggle-theme" class="btn-ghost" title="theme">◐</button>
      <a id="btn-rss" class="btn-ghost" download="threat-radar.xml" title="RSS export">RSS</a>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <section class="filter-group">
        <h3 data-i18n="filter.severity">severity</h3>
        <div class="chips" id="filter-severity">
          <button class="chip active" data-filter="severity" data-value="">all</button>
          <button class="chip sev-critical" data-filter="severity" data-value="critical">critical</button>
          <button class="chip sev-high" data-filter="severity" data-value="high">high</button>
          <button class="chip sev-medium" data-filter="severity" data-value="medium">medium</button>
          <button class="chip sev-low" data-filter="severity" data-value="low">low</button>
        </div>
      </section>
      <section class="filter-group">
        <h3 data-i18n="filter.category">category</h3>
        <div class="chips" id="filter-category"></div>
      </section>
      <section class="filter-group">
        <h3 data-i18n="filter.source">source</h3>
        <div class="chips compact" id="filter-source"></div>
      </section>
      <section class="filter-group">
        <h3 data-i18n="filter.tag">tag</h3>
        <div class="chips compact" id="filter-tag"></div>
      </section>
      <section class="filter-group">
        <h3 data-i18n="filter.vendor">vendor</h3>
        <div class="chips compact" id="filter-vendor"></div>
      </section>
      <section class="filter-group sticky-bottom">
        <button id="reset-filters" class="btn-ghost full-width" data-i18n="action.reset">reset filters</button>
      </section>
    </aside>

    <main>
      <section class="critical-wall hidden" id="critical-wall">
        <h2 class="wall-title">
          <span class="wall-mark">!</span>
          <span data-i18n="wall.title">Critical & high — last 7 days</span>
        </h2>
        <div class="wall-items" id="critical-items"></div>
      </section>

      <section class="today hidden" id="today-section">
        <h2 class="section-title">
          <span data-i18n="today.title">Last 24 hours</span>
          <span class="count" id="today-count"></span>
        </h2>
        <div class="feed compact" id="today-feed"></div>
      </section>

      <section class="all">
        <h2 class="section-title">
          <span data-i18n="all.title">All items</span>
          <span class="count" id="all-count"></span>
          <select id="sort-by" class="select-inline">
            <option value="published" data-i18n="sort.published">published (newest)</option>
            <option value="score" data-i18n="sort.score">score (highest)</option>
          </select>
        </h2>
        <div class="feed" id="all-feed">
          <div class="empty" data-i18n="state.loading">loading…</div>
        </div>
      </section>
    </main>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="assets/i18n.js"></script>
  <script src="assets/app.js"></script>
</body>
</html>
